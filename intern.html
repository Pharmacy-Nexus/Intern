<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Intern Mode</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

  <h2>Intern Mode 🔥</h2>

  <div id="setup">
    <label>Topics</label>
    <input id="topics" placeholder="cardio,renal">

    <label>عدد الأسئلة</label>
    <input id="count" type="number" value="10">

    <label>Mode</label>
    <select id="mode">
      <option value="practice">Practice</option>
      <option value="exam">Exam</option>
    </select>

    <button onclick="start()">Start</button>
  </div>

  <div id="exam"></div>

</div>

<script src="intern.js"></script>

</body>
</html>
