<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nexus AI Pharmacist</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-row">
        <div class="logo-mark">Nx</div>
        <div>
          <div class="brand-title">Nexus</div>
          <div class="brand-subtitle">AI Pharmacist Workspace</div>
        </div>
      </div>

      <button id="newChatBtn" class="primary-btn">New chat</button>
      <input id="chatSearch" class="chat-search" placeholder="Search chats..." />

      <div class="side-section-title">Pinned</div>
      <div id="pinnedChats" class="chat-list"></div>

      <div class="side-section-title">Chats</div>
      <div id="chatList" class="chat-list"></div>

      <div class="side-card">
        <div class="side-title">Modes</div>
        <button class="side-command" data-command="@case ">@case <span>تحليل حالة</span></button>
        <button class="side-command" data-command="@compare ">@compare <span>مقارنة دوائين</span></button>
        <button class="side-command" data-command="@reverse ">@reverse <span>عكس السيناريو</span></button>
        <button class="side-command" data-command="@report ">@report <span>تجهيز تقرير</span></button>
      </div>

      <div class="side-note">Saved chats are stored locally in this browser.</div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="page-title">Nexus AI Pharmacist</div>
          <div class="page-subtitle">Ask naturally. Use @ for focused modes.</div>
        </div>
        <div class="top-actions">
          <button id="pinChatBtn" class="secondary-btn">Pin</button>
          <button id="renameChatBtn" class="secondary-btn">Rename</button>
          <button id="deleteChatBtn" class="danger-btn">Delete</button>
          <button id="exportPdfBtn" class="secondary-btn">Report PDF</button>
        </div>
      </header>

      <section id="messages" class="messages"></section>

      <section class="composer-wrap">
        <div id="commandPalette" class="command-palette hidden">
          <button data-command="@case "><b>@case</b><span>Analyze patient case</span></button>
          <button data-command="@compare "><b>@compare</b><span>Compare two medicines</span></button>
          <button data-command="@reverse "><b>@reverse</b><span>Reverse scenario simulation</span></button>
          <button data-command="@report "><b>@report</b><span>Prepare editable report</span></button>
        </div>

        <form id="chatForm" class="composer">
          <textarea id="messageInput" rows="1" placeholder="Message Nexus... try @compare ramipril losartan"></textarea>
          <button id="sendBtn" type="submit" aria-label="Send message">↑</button>
        </form>
        <div class="composer-hint">اكتب <b>@</b> لفتح الأوامر · Ctrl/⌘ + Enter للإرسال</div>
      </section>
    </main>
  </div>

  <div id="pdfModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-card">
      <div class="modal-header">
        <div>
          <div class="modal-title">Editable report preview</div>
          <div class="modal-subtitle">عدّل أو احذف أي جزء قبل التصدير</div>
        </div>
        <button id="closePdfModal" class="ghost-btn">Close</button>
      </div>
      <textarea id="pdfEditor" class="pdf-editor"></textarea>
      <div class="modal-actions">
        <button id="downloadPdfBtn" class="primary-btn">Download PDF</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
